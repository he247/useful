<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Background -->
  <rect x="0" y="0" width="200" height="120" fill="white"/>
  <!-- Grid lines -->
  <line x1="35" y1="10" x2="35" y2="95" stroke="#cccccc" stroke-width="0.5"/>
  <line x1="35" y1="95" x2="190" y2="95" stroke="#cccccc" stroke-width="0.5"/>
  <line x1="35" y1="52" x2="190" y2="52" stroke="#eeeeee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="35" y1="10" x2="190" y2="10" stroke="#eeeeee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Axes -->
  <line x1="35" y1="10" x2="35" y2="95" stroke="#444444" stroke-width="1"/>
  <line x1="35" y1="95" x2="190" y2="95" stroke="#444444" stroke-width="1"/>
  <!-- Tick labels y -->
  <text x="30" y="98" font-size="7" fill="#444444" text-anchor="end">120</text>
  <text x="30" y="55" font-size="7" fill="#444444" text-anchor="end">150</text>
  <text x="30" y="13" font-size="7" fill="#444444" text-anchor="end">180</text>
  <!-- Tick labels x -->
  <text x="35" y="105" font-size="7" fill="#444444" text-anchor="middle">1</text>
  <text x="66" y="105" font-size="7" fill="#444444" text-anchor="middle">2</text>
  <text x="97" y="105" font-size="7" fill="#444444" text-anchor="middle">3</text>
  <text x="128" y="105" font-size="7" fill="#444444" text-anchor="middle">4</text>
  <text x="159" y="105" font-size="7" fill="#444444" text-anchor="middle">5</text>
  <text x="190" y="105" font-size="7" fill="#444444" text-anchor="middle">6</text>
  <!-- Axis labels -->
  <text x="112" y="116" font-size="7" fill="#444444" text-anchor="middle">Monat</text>
  <text x="8" y="55" font-size="7" fill="#444444" text-anchor="middle" transform="rotate(-90,8,55)">Umsatz</text>
  <!-- Data line (pgfplots blue style) -->
  <polyline points="35,95 66,58 97,77 128,25 159,44 190,10"
    fill="none" stroke="#2a6496" stroke-width="1.5"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Data points -->
  <circle cx="35"  cy="95" r="2.5" fill="#2a6496"/>
  <circle cx="66"  cy="58" r="2.5" fill="#2a6496"/>
  <circle cx="97"  cy="77" r="2.5" fill="#2a6496"/>
  <circle cx="128" cy="25" r="2.5" fill="#2a6496"/>
  <circle cx="159" cy="44" r="2.5" fill="#2a6496"/>
  <circle cx="190" cy="10" r="2.5" fill="#2a6496"/>
</svg>
