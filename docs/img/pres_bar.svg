<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Background -->
  <rect x="0" y="0" width="200" height="120" fill="white"/>
  <!-- Axes -->
  <line x1="35" y1="10" x2="35" y2="95" stroke="#444444" stroke-width="1"/>
  <line x1="35" y1="95" x2="190" y2="95" stroke="#444444" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="35" y1="52" x2="190" y2="52" stroke="#eeeeee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="35" y1="10" x2="190" y2="10" stroke="#eeeeee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Tick labels y (axis starts at 0) -->
  <text x="30" y="98" font-size="7" fill="#444444" text-anchor="end">0</text>
  <text x="30" y="55" font-size="7" fill="#444444" text-anchor="end">90</text>
  <text x="30" y="13" font-size="7" fill="#444444" text-anchor="end">180</text>
  <!-- Tick labels x (6 bars, evenly spaced, centered at 48,74,99,125,151,177) -->
  <text x="48"  y="105" font-size="7" fill="#444444" text-anchor="middle">1</text>
  <text x="74"  y="105" font-size="7" fill="#444444" text-anchor="middle">2</text>
  <text x="99"  y="105" font-size="7" fill="#444444" text-anchor="middle">3</text>
  <text x="125" y="105" font-size="7" fill="#444444" text-anchor="middle">4</text>
  <text x="151" y="105" font-size="7" fill="#444444" text-anchor="middle">5</text>
  <text x="177" y="105" font-size="7" fill="#444444" text-anchor="middle">6</text>
  <!-- Axis labels -->
  <text x="112" y="116" font-size="7" fill="#444444" text-anchor="middle">Monat</text>
  <text x="8" y="55" font-size="7" fill="#444444" text-anchor="middle" transform="rotate(-90,8,55)">Umsatz</text>
  <!-- Bars: y_svg = 95 - (value/178)*85, height = (value/178)*85 -->
  <!-- Bar 1: value=120, top=38, height=57 -->
  <rect x="39"  y="38" width="18" height="57" fill="#2a6496" opacity="0.85"/>
  <!-- Bar 2: value=145, top=26, height=69 -->
  <rect x="65"  y="26" width="18" height="69" fill="#2a6496" opacity="0.85"/>
  <!-- Bar 3: value=132, top=32, height=63 -->
  <rect x="90"  y="32" width="18" height="63" fill="#2a6496" opacity="0.85"/>
  <!-- Bar 4: value=168, top=15, height=80 -->
  <rect x="116" y="15" width="18" height="80" fill="#2a6496" opacity="0.85"/>
  <!-- Bar 5: value=155, top=21, height=74 -->
  <rect x="142" y="21" width="18" height="74" fill="#2a6496" opacity="0.85"/>
  <!-- Bar 6: value=178, top=10, height=85 -->
  <rect x="168" y="10" width="18" height="85" fill="#2a6496" opacity="0.85"/>
</svg>
